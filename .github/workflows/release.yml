name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web client
        run: |
          cd flutter_client
          flutter pub get
          flutter build web --wasm

      - name: Build release binary
        run: cargo build --release --features flutter --target ${{ matrix.target }}

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="abot-${VERSION}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" abot
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          shasum -a 256 "${ARCHIVE}" | awk '{print $1}' > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: abot-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            abot-*.tar.gz
            abot-*.tar.gz.sha256

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: abot-source

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dorky-robot/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM64=$(cat "abot-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz.sha256")
          SHA_X86_64=$(cat "abot-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz.sha256")

          cd homebrew-tap
          mkdir -p Formula
          if [ -f ../abot-source/homebrew/abot.rb ]; then
            sed -e "s/VERSION/${VERSION}/g" \
                -e "s/SHA256_ARM64/${SHA_ARM64}/g" \
                -e "s/SHA256_X86_64/${SHA_X86_64}/g" \
                ../abot-source/homebrew/abot.rb > Formula/abot.rb
          fi

          # If template wasn't available, build from scratch
          if [ ! -f Formula/abot.rb ]; then
            mkdir -p Formula
            cat > Formula/abot.rb << FORMULA
          class Abot < Formula
            desc "AI-native spatial terminal interface"
            homepage "https://github.com/dorky-robot/abot"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/dorky-robot/abot/releases/download/${GITHUB_REF_NAME}/abot-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              end

              on_intel do
                url "https://github.com/dorky-robot/abot/releases/download/${GITHUB_REF_NAME}/abot-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64}"
              end
            end

            def install
              bin.install "abot"
            end

            def post_install
              ohai "abot installed! Run 'abot start' to launch."
              ohai "If abot is already running, use 'abot update' for zero-downtime upgrade."
            end

            service do
              run [opt_bin/"abot", "start"]
              keep_alive true
              log_path var/"log/abot.log"
              error_log_path var/"log/abot.log"
              working_dir HOMEBREW_PREFIX
            end

            test do
              assert_match "abot", shell_output("#{bin}/abot --help")
            end
          end
          FORMULA
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/abot.rb
          git commit -m "abot ${VERSION}"
          git push
