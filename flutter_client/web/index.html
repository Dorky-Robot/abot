<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e1e2e">
  <title>abot</title>

  <!-- xterm.js styles -->
  <link rel="stylesheet" href="vendor/xterm/xterm.min.css">
  <!-- Fonts -->
  <link rel="stylesheet" href="vendor/fonts/fonts.css">

  <!-- xterm.js ESM modules loaded as globals for Dart interop -->
  <script type="module">
    import { Terminal } from './vendor/xterm/xterm.esm.js';
    import { FitAddon } from './vendor/xterm/addon-fit.esm.js';
    import { WebLinksAddon } from './vendor/xterm/addon-web-links.esm.js';
    import { SearchAddon } from './vendor/xterm/addon-search.esm.js';
    import { startRegistration, startAuthentication } from './vendor/simplewebauthn/browser.esm.js';

    // Expose to globalThis for Dart JS interop
    globalThis.xtermJs = {
      Terminal,
      FitAddon,
      WebLinksAddon,
      SearchAddon,
    };
    globalThis.simpleWebAuthn = { startRegistration, startAuthentication };
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1e1e2e;
    }
    /* Ensure xterm containers fill their space */
    .xterm-container {
      width: 100%;
      height: 100%;
    }
    .xterm-container .xterm {
      height: 100%;
    }
    /* Fill the pixel remainder below xterm rows so no gap is visible */
    .xterm-container .xterm .xterm-screen {
      height: 100% !important;
    }
    /* Ensure Flutter platform view wrappers don't clip height.
       Targets Flutter WASM's internal element — may need updating across
       Flutter versions if the renderer changes its DOM structure. */
    flt-platform-view {
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
